openapi: 3.0.0
info:
  title: Gorrent API
  description: Headless torrent search and download daemon for Openclaw automation.
  version: 1.5.5
servers:
  - url: http://localhost:7800
    description: Gorrent Daemon
security:
  - ApiKeyAuth: []
  - ApiKeyQuery: []
paths:
  /api/search:
    get:
      summary: Search for torrents across enabled scrapers.
      parameters:
        - name: q
          in: query
          description: Search query
          required: true
          schema:
            type: string
        - name: source
          in: query
          description: Specific scraper source to target (e.g. nyaa, yts)
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Successful search
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TorrentResult'
  /api/download:
    post:
      summary: Add a torrent to download.
      description: Provide either a 'magnet' link directly, or an 'auto' query to automatically search and pick the best result.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                magnet:
                  type: string
                auto:
                  type: string
                category:
                  type: string
                source:
                  type: string
                  description: Limit auto-search to a specific source
                callback:
                  type: string
                  description: Webhook URL to POST when download completes
      responses:
        '200':
          description: Download started
  /api/status:
    get:
      summary: Get status of active downloads.
      responses:
        '200':
          description: List of active torrents
  /api/torrent:
    delete:
      summary: Stop and remove an active download.
      parameters:
        - name: hash
          in: query
          description: Infohash of the torrent to stop
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Torrent stopped successfully
  /api/ws:
    get:
      summary: WebSocket endpoint for real-time status streaming.
      responses:
        '101':
          description: Switching Protocols (WebSocket)
  /health:
    get:
      summary: Docker healthcheck endpoint.
      security: []
      responses:
        '200':
          description: OK
  /metrics:
    get:
      summary: Prometheus metrics endpoint.
      security: []
      responses:
        '200':
          description: Prometheus text format stats
components:
  schemas:
    TorrentResult:
      type: object
      properties:
        infoHash:
          type: string
        name:
          type: string
        sizeBytes:
          type: integer
        seeders:
          type: integer
        leechers:
          type: integer
        source:
          type: string
        magnet:
          type: string
        score:
          type: integer
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    ApiKeyQuery:
      type: apiKey
      in: query
      name: apikey
